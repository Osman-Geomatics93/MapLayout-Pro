<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MapLayout Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <div class="logo-row">
        <svg class="logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="3" width="20" height="18" rx="2" stroke="#2563eb" stroke-width="1.5" fill="none"/>
          <rect x="4" y="5" width="12" height="10" rx="1" stroke="#2563eb" stroke-width="1" fill="#dbeafe"/>
          <rect x="17" y="5" width="4" height="4" rx="0.5" stroke="#2563eb" stroke-width="0.8" fill="#eff6ff"/>
          <line x1="4" y1="18" x2="10" y2="18" stroke="#2563eb" stroke-width="1"/>
          <polygon points="19,11 18,14 20,14" fill="#2563eb"/>
        </svg>
        <h1 class="popup-title">MapLayout Pro</h1>
      </div>
      <p class="popup-subtitle">Professional map layouts from your browser</p>
    </header>

    <div class="search-section">
      <div class="search-box">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16">
          <circle cx="6.5" cy="6.5" r="5" stroke="#94a3b8" stroke-width="1.5" fill="none"/>
          <line x1="10" y1="10" x2="14" y2="14" stroke="#94a3b8" stroke-width="1.5"/>
        </svg>
        <input
          type="text"
          id="place-search"
          placeholder="Search place or coordinates..."
          autocomplete="off"
        />
      </div>
      <ul id="search-results" class="search-results hidden"></ul>
    </div>

    <button id="open-designer" class="btn-primary">
      Open Layout Designer
      <svg width="16" height="16" viewBox="0 0 16 16" class="arrow-icon">
        <path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.5" fill="none"/>
      </svg>
    </button>

    <div class="recent-section">
      <h3 class="section-label">Recent Layouts</h3>
      <ul id="recent-layouts" class="recent-list">
        <li class="empty-state">No recent layouts yet</li>
      </ul>
    </div>

    <footer class="popup-footer">
      <div class="footer-author">
        Built by <strong>Osman O. A. Ibrahim</strong>
      </div>
      <div class="footer-links">
        <a href="https://osman-geomatics93.online/" target="_blank" rel="noopener" title="Portfolio">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="8" cy="8" r="6.5"/>
            <path d="M1.5 8h13M8 1.5c-2 2.5-2 9.5 0 13M8 1.5c2 2.5 2 9.5 0 13"/>
          </svg>
        </a>
        <a href="https://github.com/Osman-Geomatics93" target="_blank" rel="noopener" title="GitHub">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 .2A8 8 0 0 0 5.47 15.79c.4.07.55-.17.55-.38l-.01-1.49c-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.42 7.42 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48l-.01 2.2c0 .21.15.46.55.38A8 8 0 0 0 8 .2z"/>

          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
            <path d="M0 1.146C0 .513.526 0 1.175 0h13.65C15.474 0 16 .513 16 1.146v13.708c0 .633-.526 1.146-1.175 1.146H1.175C.526 16 0 15.487 0 14.854V1.146zm4.943 12.248V6.169H2.542v7.225h2.401zm-1.2-8.212c.837 0 1.358-.554 1.358-1.248-.015-.709-.52-1.248-1.342-1.248-.822 0-1.359.54-1.359 1.248 0 .694.521 1.248 1.327 1.248h.016zm4.908 8.212V9.359c0-.216.016-.432.08-.586.173-.431.568-.878 1.232-.878.869 0 1.216.662 1.216 1.634v3.865h2.401V9.25c0-2.22-1.184-3.252-2.764-3.252-1.274 0-1.845.712-2.165 1.206V6.169H6.29c.032.68 0 7.225 0 7.225h2.36z"/>

      </div>
      <span class="version">v1.0.0</span>
    </footer>
  </div>

  <script type="module" src="popup.ts"></script>
</body>
</html>
